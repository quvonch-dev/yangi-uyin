<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Raqamlarni birlashtir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0F1420;
      --panel: #171D2B;
      --panel-2: #1D2434;
      --grid-line: #262E42;
      --ink: #EDEAE2;
      --ink-dim: #8890A6;
      --ember: #FF6B4A;
      --gold: #D4A857;
      --danger: #E35C5C;

      --t2: #232B3D;
      --t4: #2B3550;
      --t8: #3A4A78;
      --t16: #4A5B96;
      --t32: #5C6FB8;
      --t64: #7A5CB8;
      --t128: #B85CB0;
      --t256: #D45C8A;
      --t512: #E37A5C;
      --t1024: #E3A55C;
      --t2048: #D4A857;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, #161C2C 0%, var(--bg) 60%);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    .stage {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .brand .mark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 34px;
      letter-spacing: 0.02em;
      background: linear-gradient(120deg, var(--ink) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    .tagline {
      font-size: 13px;
      color: var(--ink-dim);
      margin-bottom: 22px;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    .topbar {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 10px;
    }

    .scores {
      display: flex;
      gap: 10px;
    }

    .score-box {
      background: var(--panel);
      border: 1px solid var(--grid-line);
      border-radius: 10px;
      padding: 8px 14px;
      min-width: 74px;
      text-align: center;
    }

    .score-box .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 2px;
    }

    .score-box .value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--ink);
    }

    .score-box.best .value {
      color: var(--gold);
    }

    .new-game {
      background: var(--ember);
      color: #17110C;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      height: 52px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 14px rgba(255, 107, 74, 0.25);
    }

    .new-game:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(255, 107, 74, 0.35);
    }

    .new-game:active {
      transform: translateY(0px) scale(0.98);
    }

    .board-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
    }

    .board {
      position: absolute;
      inset: 0;
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--grid-line);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
    }

    .cell {
      background: var(--panel-2);
      border-radius: 10px;
    }

    .tiles {
      position: absolute;
      inset: 10px;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--ink);
      transition: left 0.12s ease, top 0.12s ease, opacity 0.12s ease;
      user-select: none;
    }

    .tile-inner {
      animation: pop 0.16s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0.5);
        opacity: 0.4;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .tile.merged .tile-inner {
      animation: merge-pulse 0.18s ease;
    }

    @keyframes merge-pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.14);
      }

      100% {
        transform: scale(1);
      }
    }

    .tile[data-v="2"] {
      background: var(--t2);
    }

    .tile[data-v="4"] {
      background: var(--t4);
    }

    .tile[data-v="8"] {
      background: var(--t8);
    }

    .tile[data-v="16"] {
      background: var(--t16);
    }

    .tile[data-v="32"] {
      background: var(--t32);
    }

    .tile[data-v="64"] {
      background: var(--t64);
    }

    .tile[data-v="128"] {
      background: var(--t128);
      font-size: 0.9em;
    }

    .tile[data-v="256"] {
      background: var(--t256);
      font-size: 0.9em;
    }

    .tile[data-v="512"] {
      background: var(--t512);
      font-size: 0.9em;
    }

    .tile[data-v="1024"] {
      background: var(--t1024);
      font-size: 0.78em;
      color: #1A1206;
    }

    .tile[data-v="2048"] {
      background: var(--t2048);
      font-size: 0.78em;
      color: #1A1206;
      box-shadow: 0 0 24px rgba(212, 168, 87, 0.6);
    }

    .hint {
      margin-top: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      text-align: center;
    }

    .hint kbd {
      background: var(--panel);
      border: 1px solid var(--grid-line);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: inherit;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 20, 32, 0.88);
      backdrop-filter: blur(2px);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      text-align: center;
      padding: 20px;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .overlay .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 26px;
    }

    .overlay.win .title {
      color: var(--gold);
    }

    .overlay.lose .title {
      color: var(--danger);
    }

    .overlay .desc {
      color: var(--ink-dim);
      font-size: 13px;
      max-width: 260px;
    }

    .overlay button {
      background: var(--ember);
      color: #17110C;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .overlay .secondary {
      background: transparent;
      color: var(--ink-dim);
      border: 1px solid var(--grid-line);
    }

    @media (max-width: 420px) {
      .brand .mark {
        font-size: 28px;
      }

      .score-box {
        min-width: 62px;
        padding: 7px 10px;
      }

      .new-game {
        height: 46px;
        padding: 0 14px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="tagline" style="margin-top:6px;">Bir xil raqamlarni bir-biriga suring va 2048 gacha birlashtiring.</div>

    <div class="topbar">
      <div class="scores">
        <div class="score-box">
          <div class="label">Ball</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-box best">
          <div class="label">Rekord</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
      <button class="new-game" id="newGame">Yangi o'yin</button>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <!-- 16 fon katakchalari JS orqali qo'shiladi -->
      </div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <div class="title" id="overlayTitle">O'yin tugadi</div>
        <div class="desc" id="overlayDesc">Boshqa yurish imkoni qolmadi.</div>
        <button id="overlayBtn">Qayta boshlash</button>
      </div>
    </div>

    <div class="hint">
      <kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> yoki barmog'ingiz bilan suring
    </div>
  </div>

  <script>
    (function () {
      const SIZE = 4;
      const boardEl = document.getElementById('board');
      const tilesEl = document.getElementById('tiles');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const overlay = document.getElementById('overlay');
      const overlayTitle = document.getElementById('overlayTitle');
      const overlayDesc = document.getElementById('overlayDesc');
      const overlayBtn = document.getElementById('overlayBtn');
      const newGameBtn = document.getElementById('newGame');

      let grid, score, best, won, over, tileId;

      // fon katakchalarini chizish
      for (let i = 0; i < SIZE * SIZE; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        boardEl.appendChild(c);
      }

      function loadBest() {
        try { return parseInt(localStorage.getItem('qosh_best') || '0', 10); } catch (e) { return 0; }
      }
      function saveBest(v) {
        try { localStorage.setItem('qosh_best', String(v)); } catch (e) { }
      }

      function emptyGrid() {
        return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      }

      function newTile() {
        return { id: tileId++, value: Math.random() < 0.9 ? 2 : 4, r: 0, c: 0, isNew: true, merged: false };
      }

      function spawnRandom() {
        const empties = [];
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!grid[r][c]) empties.push([r, c]);
        if (empties.length === 0) return;
        const [r, c] = empties[Math.floor(Math.random() * empties.length)];
        const t = newTile();
        t.r = r; t.c = c;
        grid[r][c] = t;
      }

      function init() {
        grid = emptyGrid();
        score = 0;
        won = false;
        over = false;
        tileId = 1;
        spawnRandom();
        spawnRandom();
        overlay.classList.remove('show', 'win', 'lose');
        updateScore();
        render(true);
      }

      function updateScore() {
        scoreEl.textContent = score;
        best = Math.max(best, score);
        bestEl.textContent = best;
        saveBest(best);
      }

      function cellSize() {
        const rect = boardEl.getBoundingClientRect();
        const pad = 10, gap = 10;
        return (rect.width - pad * 2 - gap * 3) / SIZE;
      }

      function render(instant) {
        tilesEl.innerHTML = '';
        const size = cellSize();
        const gap = 10;
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const t = grid[r][c];
            if (!t) continue;
            const el = document.createElement('div');
            el.className = 'tile' + (t.merged ? ' merged' : '');
            el.setAttribute('data-v', t.value > 2048 ? '2048' : t.value);
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = (c * (size + gap)) + 'px';
            el.style.top = (r * (size + gap)) + 'px';
            el.style.fontSize = Math.max(16, size * 0.4) + 'px';
            const inner = document.createElement('div');
            inner.className = 'tile-inner';
            inner.textContent = t.value;
            el.appendChild(inner);
            tilesEl.appendChild(el);
            t.merged = false;
            t.isNew = false;
          }
        }
      }

      function cloneVal(g) {
        return g.map(row => row.map(t => t ? t.value : null));
      }

      function move(dir) {
        if (over) return;
        // dir: 'left','right','up','down'
        let moved = false;
        const gained = { v: 0 };

        function slideLine(line) {
          // line: array of tiles or null, length SIZE, tuzatilgan chapga siljish
          const compact = line.filter(Boolean);
          const result = [];
          for (let i = 0; i < compact.length; i++) {
            if (i < compact.length - 1 && compact[i].value === compact[i + 1].value && !compact[i].justMerged) {
              const merged = compact[i + 1];
              merged.value = compact[i].value * 2;
              merged.merged = true;
              merged.justMerged = true;
              gained.v += merged.value;
              if (merged.value === 2048) won = true;
              result.push(merged);
              i++;
            } else {
              result.push(compact[i]);
            }
          }
          while (result.length < SIZE) result.push(null);
          return result;
        }

        const before = cloneVal(grid);

        if (dir === 'left' || dir === 'right') {
          for (let r = 0; r < SIZE; r++) {
            let line = grid[r].slice();
            if (dir === 'right') line = line.reverse();
            line = slideLine(line);
            if (dir === 'right') line = line.reverse();
            for (let c = 0; c < SIZE; c++) {
              grid[r][c] = line[c];
              if (line[c]) { line[c].r = r; line[c].c = c; }
            }
          }
        } else {
          for (let c = 0; c < SIZE; c++) {
            let col = [];
            for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
            if (dir === 'down') col = col.reverse();
            col = slideLine(col);
            if (dir === 'down') col = col.reverse();
            for (let r = 0; r < SIZE; r++) {
              grid[r][c] = col[r];
              if (col[r]) { col[r].r = r; col[r].c = c; }
            }
          }
        }

        // reset justMerged flags
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (grid[r][c]) grid[r][c].justMerged = false;

        const after = cloneVal(grid);
        moved = JSON.stringify(before) !== JSON.stringify(after);

        if (moved) {
          score += gained.v;
          updateScore();
          spawnRandom();
          render();
          checkEnd();
        }
      }

      function canMove() {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (!grid[r][c]) return true;
            const v = grid[r][c].value;
            if (c < SIZE - 1 && grid[r][c + 1] && grid[r][c + 1].value === v) return true;
            if (r < SIZE - 1 && grid[r + 1][c] && grid[r + 1][c].value === v) return true;
          }
        }
        return false;
      }

      function checkEnd() {
        if (won && !overlay.classList.contains('win') && !overlay.dataset.wonShown) {
          overlay.dataset.wonShown = '1';
          overlayTitle.textContent = "G'alaba! 2048 yig'ildi";
          overlayDesc.textContent = "Davom etishingiz mumkin yoki yangi o'yin boshlang.";
          overlay.classList.add('show', 'win');
          overlayBtn.textContent = 'Davom etish';
          overlayBtn.onclick = () => { overlay.classList.remove('show'); };
          return;
        }
        if (!canMove()) {
          over = true;
          overlayTitle.textContent = "O'yin tugadi";
          overlayDesc.textContent = 'Boshqa yurish imkoni qolmadi. Ball: ' + score;
          overlay.classList.add('show', 'lose');
          overlayBtn.textContent = 'Qayta boshlash';
          overlayBtn.onclick = () => { init(); };
        }
      }

      document.addEventListener('keydown', (e) => {
        const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
        if (map[e.key]) {
          e.preventDefault();
          move(map[e.key]);
        }
      });

      // touch swipe
      let touchStartX = 0, touchStartY = 0;
      tilesEl.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        touchStartX = t.clientX; touchStartY = t.clientY;
      }, { passive: true });
      tilesEl.addEventListener('touchend', (e) => {
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) {
          move(dx > 0 ? 'right' : 'left');
        } else {
          move(dy > 0 ? 'down' : 'up');
        }
      }, { passive: true });

      newGameBtn.addEventListener('click', () => { overlay.dataset.wonShown = ''; init(); });
      overlayBtn.addEventListener('click', () => { });

      window.addEventListener('resize', () => render(true));

      best = loadBest();
      bestEl.textContent = best;
      init();
    })();
  </script>
</body>

</html>
